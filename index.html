<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Physio Timer">
<title>Physio Timer</title>
<style>
:root {
  --bg:#f7f4ef;--surface:#ffffff;--border:#e2ddd6;--text:#1a1a2e;--muted:#7a7080;
  --teal:#2d8a85;--teal-bg:rgba(45,138,133,0.10);--gold:#c9922a;--gold-bg:rgba(201,146,42,0.10);
  --red:#c94040;--red-bg:rgba(201,64,64,0.10);--green:#2d8a5a;--green-bg:rgba(45,138,90,0.12);
  --purple:#6b52b8;--purple-bg:rgba(107,82,184,0.10);--accent:#1a1a2e;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0f0f14;--surface:#1a1a24;--border:#2a2a3a;--text:#e8e4dc;--muted:#7a7a8a;--accent:#e8e4dc;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;padding-top:calc(16px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header h1{font-size:17px;font-weight:600;color:var(--text);}
.header .subtitle{font-size:12px;color:var(--muted);margin-top:1px;}
.sound-toggle{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.sound-toggle.on{color:var(--teal);border-color:var(--teal);background:var(--teal-bg);}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}
.content{padding:16px;max-width:480px;margin:0 auto;}
.ex-list{display:flex;flex-direction:column;gap:10px;}
.ex-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;cursor:pointer;text-align:left;width:100%;transition:all 0.15s;-webkit-appearance:none;}
.ex-btn:active{transform:scale(0.98);opacity:0.85;}
.ex-btn.active{border-color:var(--teal);background:var(--teal-bg);}
.ex-icon{font-size:28px;width:36px;text-align:center;flex-shrink:0;}
.ex-info{flex:1;}
.ex-name{font-size:15px;font-weight:600;color:var(--text);}
.ex-btn.active .ex-name{color:var(--teal);}
.ex-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.ex-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4;}
.ex-chevron{color:var(--muted);font-size:18px;flex-shrink:0;}
.timer-wrap{display:flex;flex-direction:column;gap:14px;}
.no-ex{text-align:center;padding:48px 24px;color:var(--muted);font-size:15px;background:var(--surface);border-radius:16px;border:1px solid var(--border);}
.no-ex .big{font-size:48px;margin-bottom:12px;}
.timer-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;}
.timer-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.timer-exname{font-size:16px;font-weight:600;color:var(--text);}
.phase-pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.3px;}
.pill-rep{background:var(--teal-bg);color:var(--teal);}
.pill-hold{background:var(--gold-bg);color:var(--gold);}
.pill-rest{background:var(--purple-bg);color:var(--purple);}
.pill-done{background:var(--green-bg);color:var(--green);}
.pill-idle{background:var(--border);color:var(--muted);}
.progress-track{height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:var(--teal);transition:width 0.3s ease;}
.ring-center{display:flex;justify-content:center;margin-bottom:20px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.stat-box{background:var(--bg);border-radius:10px;padding:10px 8px;text-align:center;}
.stat-val{font-size:19px;font-weight:600;color:var(--text);}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.2px;}
.ctrl-row{display:flex;gap:10px;}
.btn-start{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:600;background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:opacity 0.15s,transform 0.1s;}
.btn-start:active{opacity:0.8;transform:scale(0.98);}
.btn-reset{padding:14px 18px;border-radius:12px;font-size:14px;font-weight:500;background:transparent;color:var(--muted);border:1px solid var(--border);cursor:pointer;}
.btn-reset:active{background:var(--border);}
.done-msg{text-align:center;font-size:13px;font-weight:500;color:var(--green);padding:8px 0 0;}
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;}
.history-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.history-title{font-size:14px;font-weight:600;color:var(--text);}
.history-date{font-size:12px;color:var(--muted);}
.history-row{display:flex;justify-content:space-between;padding:10px 16px;font-size:13px;border-bottom:1px solid var(--border);}
.history-row:last-child{border-bottom:none;}
.history-row .lbl{color:var(--muted);}
.history-row .val{font-weight:500;color:var(--text);}
.empty-history{text-align:center;padding:40px 24px;color:var(--muted);font-size:14px;background:var(--surface);border-radius:14px;border:1px solid var(--border);}
.clear-btn{width:100%;padding:14px;border-radius:12px;font-size:14px;color:var(--red);background:var(--red-bg);border:none;cursor:pointer;font-weight:500;margin-top:4px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.info-exheader{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.info-exheader .ico{font-size:22px;}
.info-exheader .nme{font-size:14px;font-weight:600;color:var(--text);}
.info-exheader .met{font-size:12px;color:var(--muted);margin-top:2px;}
.info-row{padding:10px 16px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--border);line-height:1.5;}
.info-row:last-child{border-bottom:none;}
.info-row strong{color:var(--text);}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>Physio Timer</h1>
    <div class="subtitle">Dérangement L4-5 · 17 mars 2026</div>
  </div>
  <button class="sound-toggle on" id="soundToggle" onclick="toggleSound()">🔔 Son</button>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('exercises')">Exercices</div>
  <div class="tab" onclick="showTab('timer')">Timer</div>
  <div class="tab" onclick="showTab('history')">Historique</div>
  <div class="tab" onclick="showTab('info')">Info</div>
</div>
<div class="content">
  <div id="tab-exercises"><div class="ex-list" id="exList"></div></div>
  <div id="tab-timer" style="display:none"><div class="timer-wrap" id="timerWrap"></div></div>
  <div id="tab-history" style="display:none"><div id="historyContent"></div></div>
  <div id="tab-info" style="display:none"><div id="infoContent"></div></div>
</div>
<script>
const EXERCISES = [
  {
    id:'abduction', icon:'🍑', name:'Abduction hanche contre mur',
    series:2, reps:15, holdSec:7, repSec:3, restRep:3, restSerie:20,
    meta:'2 séries · 15 reps · tenir 7 sec',
    muscles:'Moyen fessier, petit fessier',
    desc:"Sur le côté, dos contre le mur, jambe supérieure étirée, orteils vers l'avant, talon sur le mur. Soulever en glissant le talon. Bassin droit, jambe ne pivote pas."
  },
  {
    id:'clamshell', icon:'🦀', name:'Clamshell avec élastique',
    series:3, reps:12, holdSec:0, repSec:3, restRep:2, restSerie:15,
    meta:'3 séries · 12 reps',
    muscles:'Moyen fessier, rotateurs externes de hanche',
    desc:"Sur le côté, élastique au-dessus des genoux, cuisses en ligne avec le tronc, genoux à 90°. Pieds collés, soulever le genou supérieur sans bouger le bassin."
  },
  {
    id:'transverse', icon:'🎯', name:'Transverse, extension alternée',
    series:3, reps:8, holdSec:0, repSec:4, restRep:3, restSerie:15,
    meta:'3 séries · 8 reps/côté',
    muscles:'Transverse abdomen, plancher pelvien, multifides',
    desc:"Couché sur le dos, genoux fléchis, dos neutre. Engager plancher pelvien et transverse. Extension d'une jambe sans que le talon touche le sol, dos à plat."
  },
  {
    id:'unipodal', icon:'🦵', name:'Debout sur une jambe',
    series:2, reps:8, holdSec:30, repSec:3, restRep:5, restSerie:20,
    meta:'2 séries · 8/jambe · tenir 30 sec',
    muscles:'Moyen fessier, quadriceps, stabilisateurs cheville',
    desc:"Debout, pieds rapprochés, mains sur les hanches. Transférer le poids sur une jambe, plier l'autre à 90°. Bassin immobile, genou d'appui stable."
  },
  {
    id:'psoas', icon:'🧘', name:'Étirement fléchisseurs hanche',
    series:1, reps:3, holdSec:15, repSec:3, restRep:5, restSerie:0,
    meta:'3 reps · tenir 15 sec',
    muscles:'Psoas, iliaque, droit fémoral',
    desc:"Fente avant à 90° avec appui sur chaise. Basculer le bassin vers l'arrière, transférer le poids vers l'avant. Haut du corps droit, bas du dos plat."
  },
  {
    id:'cobra', icon:'🐍', name:'Extension lombaire passive',
    series:1, reps:10, holdSec:0, repSec:4, restRep:3, restSerie:0,
    meta:'10 reps · aux 2-3h toute la journée',
    muscles:'Érecteurs du rachis, multifides',
    desc:"Sur le ventre, mains à hauteur du visage. Soulève graduellement tête puis tronc en poussant avec les bras, fesses relâchées, bassin au sol."
  },
];

let currentEx=null,activeTab='exercises',timerRunning=false,timerInterval=null;
let phase='idle',currentSerie=1,currentRep=1,phaseTime=0,phaseTotal=0,totalSec=0;
let sessionHistory=JSON.parse(localStorage.getItem('physio_history')||'[]');

/* ─── SOUND ENGINE (Web Audio API) ─── */
let audioCtx=null;
function getCtx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playTone(freq,dur,type,gain){
  try{
    const ctx=getCtx();
    if(ctx.state==='suspended')ctx.resume();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(gain||0.35,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}
let soundEnabled=localStorage.getItem('physio_sound')!=='off';

function playBeep(type){
  if(!soundEnabled)return;
  if(type==='start'){playTone(880,0.12);setTimeout(()=>playTone(1100,0.18),130);}
  else if(type==='hold'){playTone(660,0.15);setTimeout(()=>playTone(660,0.15),180);}
  else if(type==='rest'){playTone(440,0.2,'triangle',0.28);}
  else if(type==='rep_done'){playTone(550,0.1);}
  else if(type==='serie_done'){playTone(700,0.15);setTimeout(()=>playTone(900,0.2),180);}
  else if(type==='finished'){playTone(880,0.15);setTimeout(()=>playTone(1100,0.15),160);setTimeout(()=>playTone(1320,0.3),320);}
  else if(type==='countdown'){playTone(330,0.08,'square',0.18);}
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  localStorage.setItem('physio_sound',soundEnabled?'on':'off');
  const btn=document.getElementById('soundToggle');
  if(soundEnabled){
    btn.textContent='🔔 Son';btn.classList.add('on');
    try{
      const ctx=getCtx();
      ctx.resume().then(()=>playBeep('start'));
    }catch(e){}
  }else{
    btn.textContent='🔕 Muet';btn.classList.remove('on');
  }
}

function showTab(tab){
  ['exercises','timer','history','info'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['exercises','timer','history','info'][i]===tab);
  });
  activeTab=tab;
  if(tab==='history')renderHistory();
  if(tab==='info')renderInfo();
  if(tab==='timer')renderTimer();
}

function renderExList(){
  const list=document.getElementById('exList');
  list.innerHTML='';
  EXERCISES.forEach(ex=>{
    const btn=document.createElement('button');
    btn.className='ex-btn'+(currentEx&&currentEx.id===ex.id?' active':'');
    btn.innerHTML=`<div class="ex-icon">${ex.icon}</div><div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-meta">${ex.meta}</div><div class="ex-desc">${ex.desc.substring(0,70)}…</div></div><div class="ex-chevron">›</div>`;
    btn.onclick=()=>{selectEx(ex);showTab('timer');};
    list.appendChild(btn);
  });
}

function selectEx(ex){
  if(timerRunning)return;
  currentEx=ex;resetState();renderExList();renderTimer();
}

function renderTimer(){
  const wrap=document.getElementById('timerWrap');
  if(!currentEx){wrap.innerHTML=`<div class="no-ex"><div class="big">⏱️</div>Sélectionne un exercice<br>dans l'onglet Exercices</div>`;return;}
  const ex=currentEx;
  const phaseNames={idle:'Prêt',rep:'Mouvement',hold:'Tenir','rest-rep':'Pause','rest-serie':'Repos série',done:'Terminé'};
  const pillClass={idle:'pill-idle',rep:'pill-rep',hold:'pill-hold','rest-rep':'pill-rest','rest-serie':'pill-rest',done:'pill-done'};
  const totalPhases=ex.series*ex.reps;
  const donePhases=(currentSerie-1)*ex.reps+(currentRep-1);
  const overallPct=phase==='done'?100:Math.round(donePhases/totalPhases*100);
  const arcCirc=345;
  const arcProgress=phaseTotal>0?(phaseTotal-phaseTime)/phaseTotal:0;
  const arcOffset=Math.round(arcCirc*(1-arcProgress));
  const ringColor=phase==='hold'?'#c9922a':phase==='rest-rep'||phase==='rest-serie'?'#6b52b8':phase==='done'?'#2d8a5a':'#2d8a85';
  const timeDisplay=phase==='idle'?'—':String(phaseTime);
  wrap.innerHTML=`
    <div class="timer-card">
      <div class="timer-top">
        <div class="timer-exname">${ex.icon} ${ex.name}</div>
        <div class="phase-pill ${pillClass[phase]}">${phaseNames[phase]}</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${overallPct}%"></div></div>
      <div class="ring-center">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="55" fill="none" stroke-width="7" stroke="#e2ddd6"/>
          <circle cx="70" cy="70" r="55" fill="none" stroke-width="7" stroke="${ringColor}" stroke-linecap="round"
            stroke-dasharray="${arcCirc}" stroke-dashoffset="${arcOffset}"
            transform="rotate(-90 70 70)" style="transition:stroke-dashoffset 0.8s ease,stroke 0.3s"/>
          <text x="70" y="62" text-anchor="middle" font-size="32" font-weight="700" fill="var(--text)" font-family="-apple-system,sans-serif">${timeDisplay}</text>
          <text x="70" y="80" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="-apple-system,sans-serif">${phase!=='idle'?'secondes':''}</text>
          <text x="70" y="100" text-anchor="middle" font-size="12" font-weight="600" fill="${ringColor}" font-family="-apple-system,sans-serif">${phaseNames[phase]}</text>
        </svg>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val">${currentRep}/${ex.reps}</div><div class="stat-lbl">Répétition</div></div>
        <div class="stat-box"><div class="stat-val">${currentSerie}/${ex.series}</div><div class="stat-lbl">Série</div></div>
        <div class="stat-box"><div class="stat-val">${fmtTime(totalSec)}</div><div class="stat-lbl">Temps</div></div>
      </div>
      <div class="ctrl-row">
        <button class="btn-start" onclick="toggleTimer()">${phase==='done'?'↺ Reset':timerRunning?'⏸ Pause':phase==='idle'?'▶ Commencer':'▶ Reprendre'}</button>
        <button class="btn-reset" onclick="resetTimer()">Reset</button>
      </div>
      ${phase==='done'?`<div class="done-msg">✓ Complété en ${fmtTime(totalSec)} — Bien joué!</div>`:''}
    </div>`;
}

/* ─── WAKE LOCK ─── */
let wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){wakeLock.release();wakeLock=null;}
}
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState==='visible'&&timerRunning)await requestWakeLock();
});

function toggleTimer(){
  if(!currentEx)return;
  if(phase==='done'){resetTimer();return;}
  if(timerRunning){
    timerRunning=false;
    clearInterval(timerInterval);
    releaseWakeLock();
  }else{
    timerRunning=true;
    try{getCtx();}catch(e){}
    requestWakeLock();
    if(phase==='idle')startPhase('rep');
    timerInterval=setInterval(tick,1000);
  }
  renderTimer();
}

function startPhase(p){
  phase=p;
  const ex=currentEx;
  const durations={'rep':ex.repSec,'hold':ex.holdSec,'rest-rep':ex.restRep,'rest-serie':ex.restSerie};
  phaseTotal=durations[p]||0;
  phaseTime=phaseTotal;
  if(p==='rep')playBeep('start');
  else if(p==='hold')playBeep('hold');
  else if(p==='rest-rep'||p==='rest-serie')playBeep('rest');
  renderTimer();
}

function tick(){
  totalSec++;phaseTime--;
  if(phaseTime<=0)advancePhase();
  else{if(phaseTime<=3)playBeep('countdown');renderTimer();}
}

function advancePhase(){
  const ex=currentEx;
  if(phase==='rep'){if(ex.holdSec>0){startPhase('hold');return;}}
  if(phase==='rep'||phase==='hold'){
    if(currentRep<ex.reps){currentRep++;playBeep('rep_done');ex.restRep>0?startPhase('rest-rep'):startPhase('rep');}
    else if(currentSerie<ex.series){playBeep('serie_done');ex.restSerie>0?startPhase('rest-serie'):(()=>{currentSerie++;currentRep=1;startPhase('rep');})();}
    else endExercise();
  }else if(phase==='rest-rep')startPhase('rep');
  else if(phase==='rest-serie'){currentSerie++;currentRep=1;startPhase('rep');}
}

function endExercise(){
  phase='done';timerRunning=false;clearInterval(timerInterval);
  releaseWakeLock();
  playBeep('finished');saveSession();renderTimer();
}

function resetTimer(){timerRunning=false;clearInterval(timerInterval);resetState();renderTimer();}

function resetState(){phase='idle';currentSerie=1;currentRep=1;phaseTime=0;phaseTotal=0;totalSec=0;}

function saveSession(){
  const now=new Date();
  sessionHistory.unshift({exName:currentEx.name,exIcon:currentEx.icon,duration:totalSec,series:currentEx.series,reps:currentEx.reps,date:now.toLocaleDateString('fr-CA'),time:now.toLocaleTimeString('fr-CA',{hour:'2-digit',minute:'2-digit'})});
  if(sessionHistory.length>50)sessionHistory=sessionHistory.slice(0,50);
  localStorage.setItem('physio_history',JSON.stringify(sessionHistory));
}

function renderHistory(){
  const el=document.getElementById('historyContent');
  if(sessionHistory.length===0){el.innerHTML=`<div class="empty-history">Aucune session enregistrée.<br>Complète un exercice pour commencer.</div>`;return;}
  let html='';
  sessionHistory.forEach(s=>{html+=`<div class="history-card"><div class="history-header"><div class="history-title">${s.exIcon} ${s.exName}</div><div class="history-date">${s.date} ${s.time}</div></div><div class="history-row"><span class="lbl">Durée</span><span class="val">${fmtTime(s.duration)}</span></div><div class="history-row"><span class="lbl">Séries</span><span class="val">${s.series}</span></div><div class="history-row"><span class="lbl">Reps</span><span class="val">${s.reps}</span></div></div>`;});
  html+=`<button class="clear-btn" onclick="clearHistory()">Effacer l'historique</button>`;
  el.innerHTML=html;
}

function clearHistory(){
  if(confirm("Effacer tout l'historique?")){sessionHistory=[];localStorage.removeItem('physio_history');renderHistory();}
}

function renderInfo(){
  const el=document.getElementById('infoContent');
  let html='';
  EXERCISES.forEach(ex=>{
    html+=`<div class="info-card"><div class="info-exheader"><div class="ico">${ex.icon}</div><div><div class="nme">${ex.name}</div><div class="met">${ex.meta}</div></div></div><div class="info-row"><strong>Muscles :</strong> ${ex.muscles}</div><div class="info-row">${ex.desc}</div><div class="info-row"><strong>Séries :</strong> ${ex.series} &nbsp;|&nbsp; <strong>Reps :</strong> ${ex.reps} &nbsp;|&nbsp; <strong>Tenir :</strong> ${ex.holdSec>0?ex.holdSec+' sec':'—'}</div></div>`;
  });
  el.innerHTML=html;
}

function fmtTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

if(!soundEnabled){const btn=document.getElementById('soundToggle');btn.textContent='🔕 Muet';btn.classList.remove('on');}
renderExList();
</script>
</body>
</html>
